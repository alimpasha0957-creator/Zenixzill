<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — ZenixZill</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .dash-layout { display: flex; min-height: 100vh; padding-top: 65px; }

    /* SIDEBAR */
    .sidebar {
      width: 260px; flex-shrink: 0;
      background: var(--bg2); border-right: 1px solid var(--border);
      padding: 1.5rem 1rem; position: fixed; top: 65px; bottom: 0; overflow-y: auto;
    }
    .sidebar-label { font-size: 0.72rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; padding: 0 0.5rem; margin-bottom: 0.6rem; margin-top: 1.2rem; }
    .sidebar-label:first-child { margin-top: 0; }
    .sidebar-item {
      display: flex; align-items: center; gap: 10px;
      padding: 0.6rem 0.7rem; border-radius: var(--radius-sm);
      font-size: 0.88rem; color: var(--text-muted); cursor: pointer;
      transition: all 0.15s; border: 1px solid transparent;
    }
    .sidebar-item:hover { background: var(--card-bg); color: var(--text); }
    .sidebar-item.active { background: rgba(200,240,74,0.08); color: var(--accent); border-color: rgba(200,240,74,0.15); }
    .sidebar-cat { font-size: 0.65rem; background: var(--bg3); padding: 2px 6px; border-radius: 4px; color: var(--text-dim); margin-left: auto; }

    /* MAIN */
    .main { margin-left: 260px; flex: 1; padding: 2rem; }

    /* WELCOME */
    .welcome-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;
    }
    .welcome-bar h1 { font-size: 1.5rem; }
    .welcome-bar h1 span { color: var(--accent); }
    .welcome-meta { font-size: 0.82rem; color: var(--text-muted); margin-top: 2px; }

    /* STATS ROW */
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.1rem; }
    .stat-card .n { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 700; color: var(--accent); }
    .stat-card .l { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }

    /* METHODS GRID */
    .methods-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.2rem; }
    .method-card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.4rem; cursor: pointer; transition: all 0.2s;
    }
    .method-card:hover { border-color: rgba(200,240,74,0.25); transform: translateY(-2px); background: rgba(255,255,255,0.04); }
    .mc-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.7rem; }
    .mc-cat { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-dim); }
    .mc-badge { font-size: 0.65rem; padding: 3px 8px; background: rgba(200,240,74,0.1); border: 1px solid rgba(200,240,74,0.2); border-radius: 100px; color: var(--accent); }
    .mc-title { font-size: 1rem; font-weight: 600; margin-bottom: 0.5rem; }
    .mc-desc { font-size: 0.83rem; color: var(--text-muted); line-height: 1.5; margin-bottom: 1rem; }
    .mc-footer { display: flex; align-items: center; justify-content: space-between; }
    .mc-steps { font-size: 0.78rem; color: var(--text-dim); }
    .mc-read { font-size: 0.8rem; color: var(--accent); font-weight: 500; }

    /* DETAIL VIEW */
    .detail-view { display: none; }
    .detail-view.active { display: block; }
    .list-view { display: block; }
    .list-view.hidden { display: none; }

    .detail-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .back-btn { display: flex; align-items: center; gap: 6px; padding: 0.5rem 1rem; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 0.85rem; cursor: pointer; color: var(--text-muted); transition: all 0.2s; }
    .back-btn:hover { color: var(--text); border-color: var(--border-hover); }

    .detail-box { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; }
    .detail-box h2 { font-size: 1.5rem; margin-bottom: 0.3rem; }
    .detail-meta { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .detail-meta span { font-size: 0.78rem; color: var(--text-muted); }
    .detail-content { font-size: 0.93rem; line-height: 1.8; color: var(--text-muted); white-space: pre-line; }
    .detail-content h2 { color: var(--text); font-size: 1.1rem; margin: 1.5rem 0 0.5rem; }
    .detail-content h3 { color: var(--accent); font-size: 0.95rem; margin: 1.2rem 0 0.3rem; font-family: 'DM Sans', sans-serif; font-weight: 600; }
    .detail-content strong { color: var(--text); }

    @media(max-width: 768px) {
      .sidebar { display: none; }
      .main { margin-left: 0; padding: 1.2rem; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo" style="cursor:pointer" onclick="window.location.href='index.html'">Zenix<span style="color:var(--accent)">Zill</span></div>
  <div class="nav-links">
    <span id="nav-name" style="font-size:0.85rem;color:var(--text-muted);"></span>
    <button class="btn btn-outline" style="padding:0.4rem 0.9rem;font-size:0.82rem;" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="dash-layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-label">Menu</div>
    <div class="sidebar-item active" onclick="showAll()">
      <span>📚</span> All Methods
    </div>

    <div class="sidebar-label">Categories</div>
    <div id="sidebar-cats"></div>

    <div class="sidebar-label">Account</div>
    <div class="sidebar-item" onclick="logout()">
      <span>🚪</span> Logout
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main">

    <!-- LIST VIEW -->
    <div class="list-view" id="list-view">
      <div class="welcome-bar">
        <div>
          <h1>Welcome back, <span id="user-name"></span> 👋</h1>
          <div class="welcome-meta">All methods unlocked · Lifetime access</div>
        </div>
        <span class="badge">✅ Active Member</span>
      </div>

      <div class="stats-row">
        <div class="stat-card"><div class="n" id="total-methods">6</div><div class="l">Methods Available</div></div>
        <div class="stat-card"><div class="n">∞</div><div class="l">Access Duration</div></div>
        <div class="stat-card"><div class="n">₹299</div><div class="l">Paid Once</div></div>
      </div>

      <div class="methods-grid" id="methods-grid"></div>
    </div>

    <!-- DETAIL VIEW -->
    <div class="detail-view" id="detail-view">
      <div class="detail-header">
        <button class="back-btn" onclick="goBack()">← Back to Methods</button>
        <span id="detail-cat" class="badge" style="font-size:0.72rem;"></span>
      </div>
      <div class="detail-box">
        <h2 id="detail-title"></h2>
        <div class="detail-meta">
          <span id="detail-steps"></span>
          <span id="detail-price"></span>
        </div>
        <div class="detail-content" id="detail-content"></div>
      </div>
    </div>

  </main>
</div>

<div id="toast" class="toast"></div>
<script src="app.js"></script>
<script>
  // Auth check
  const user = requirePaid();
  if (user) {
    document.getElementById('user-name').textContent = user.name.split(' ')[0];
    document.getElementById('nav-name').textContent = user.name;
  }

  // Build sidebar categories
  const cats = [...new Set(METHODS.map(m => m.category))];
  const catIcons = { Earning: '💸', 'Social Media': '📱', 'E-commerce': '🛒', Trading: '📈', Career: '💼' };
  const sidebarCats = document.getElementById('sidebar-cats');
  cats.forEach(cat => {
    const div = document.createElement('div');
    div.className = 'sidebar-item';
    div.innerHTML = `<span>${catIcons[cat] || '📌'}</span> ${cat} <span class="sidebar-cat">${METHODS.filter(m=>m.category===cat).length}</span>`;
    div.onclick = () => filterCat(cat);
    sidebarCats.appendChild(div);
  });

  // Render methods
  function renderMethods(list) {
    const grid = document.getElementById('methods-grid');
    grid.innerHTML = '';
    list.forEach(m => {
      grid.innerHTML += `
        <div class="method-card" onclick="openMethod(${m.id})">
          <div class="mc-top">
            <span class="mc-cat">${m.category}</span>
            ${m.badge ? `<span class="mc-badge">${m.badge}</span>` : ''}
          </div>
          <div class="mc-title">${m.title}</div>
          <div class="mc-desc">${m.desc}</div>
          <div class="mc-footer">
            <span class="mc-steps">📋 ${m.steps} steps</span>
            <span class="mc-read">Read Method →</span>
          </div>
        </div>`;
    });
    document.getElementById('total-methods').textContent = list.length;
  }

  renderMethods(METHODS);

  function showAll() {
    renderMethods(METHODS);
    document.querySelectorAll('.sidebar-item').forEach((el, i) => el.classList.toggle('active', i === 0));
  }

  function filterCat(cat) {
    renderMethods(METHODS.filter(m => m.category === cat));
    goBack();
  }

  function openMethod(id) {
    const m = METHODS.find(x => x.id === id);
    if (!m) return;

    document.getElementById('detail-title').textContent = m.title;
    document.getElementById('detail-cat').textContent = m.category;
    document.getElementById('detail-steps').textContent = `📋 ${m.steps} steps`;
    document.getElementById('detail-price').textContent = `💰 Value: ₹${m.price}`;

    // Render markdown-like content
    let html = m.full
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/^- (.+)$/gm, '• $1<br/>')
      .replace(/\n/g, '<br/>');
    document.getElementById('detail-content').innerHTML = html;

    document.getElementById('list-view').classList.add('hidden');
    document.getElementById('detail-view').classList.add('active');
    window.scrollTo(0, 0);
  }

  function goBack() {
    document.getElementById('list-view').classList.remove('hidden');
    document.getElementById('detail-view').classList.remove('active');
  }
</script>
</body>
</html>
